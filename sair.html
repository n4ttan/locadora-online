<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corujão Flix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: url('images/background.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            overflow: auto;
        }

        .blur-overlay{ 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
        }

        .confirmation-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 8px;
            color: white;
            text-align: center;
            z-index: 10;
        }

        .confirmation-box button {
            margin: 10px;
        }
    </style>

</head>

<body>
    <header class="bg-dark text-white py-1" style="min-height: 50px;">
        <div class="d-flex align-items-center ms-3" style="height: 100%;">
            <img src="images/logotipo.png" alt="Corujão Flix" width="200">
            
            <nav class="d-flex justify-content-center align-items-center" style="font-family: 'Roboto', sans-serif; font-weight: 500;">
                <a href="paginaInicial.html" class="text-white mx-3">Página Inicial</a>
                <a href="filmes.html" class="text-white mx-3">Filmes</a> 
                <a href="trailers.html" class="text-white mx-3">Trailers</a> 
                <a href="trilhaSonora.html" class="text-white mx-3">Trilha Sonora</a> 
                <a href="contato.html" class="text-white mx-3">Contato</a> 
                <a href="sobre.html" class="text-white mx-3">Sobre</a> 
                <a href="#" class="btn btn-danger mx-3">Sair</a>
            </nav>                
        </div>
    </header>
    <br>
    <div class="blur-overlay"></div>

    <div class="confirmation-box">
        <h3>Deseja mesmo sair?</h3>
        <p>Você pode voltar para a Página Inicial ou sair da plataforma.</p>
        <button class="btn btn-success" onclick="window.location.href = 'paginaInicial.html';">Voltar para Página Inicial</button>
        <button class="btn btn-danger" onclick="window.location.href = 'index.html';">Sim, Sair</button>
    </div>

</body>
</html>
