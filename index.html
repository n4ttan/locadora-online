<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corujão Flix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url('images/background.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: auto;
        }

        .blur-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: -1;
        }

        .btn-toggle.active {
            background-color: #007bff !important;
            color: white !important;
            border: 2px solid #0056b3;
            box-shadow: 0px 0px 10px rgba(0, 123, 255, 0.5);
        }
        
        .form-container {
            width: 90%;
            max-width: 400px;
        }
    </style>

</head>

<body class="bg-dark text-white">
    <div class="blur-background"></div>

    <div class="d-flex justify-content-center align-items-center vh-100 flex-column text-center">
        <img src="images/logo.jpeg" class="rounded-circle mb-4" alt="Logo" width="250" height="250">
        <h1>Bem-vindo ao Corujão Filmes</h1>

        <div class="row w-50 g-1 mb-4">
            <div class="col-6 text-end">
                <button id="btnLogin" class="btn btn-secondary w-50 btn-toggle" onclick="showForm('login')">Login</button>
            </div>
            <div class="col-6 text-start">
                <button id="btnRegister" class="btn btn-secondary w-50 btn-toggle" onclick="showForm('register')">Cadastrar</button>
            </div>
        </div>

        <div class="form-container bg-light p-4 rounded shadow">
            <form id="formLogin">
                <div class="mb-3">
                    <label class="form-label text-muted">Usuário</label>
                    <input type="email" class="form-control" id="loginEmail" placeholder="Digite seu email">
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted">Senha</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="passwordLogin" placeholder="Digite sua senha">
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('passwordLogin', 'iconLogin')">
                            <img id="iconLogin" src="images/fechado.png" width="20" height="20">
                        </button>
                    </div>
                </div>

                <button type="button" class="btn btn-primary w-100" onclick="loginUser()">Entrar</button>
            </form>

            <form id="formRegister" style="display: none;">
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Nome">
                </div>
                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Sobrenome">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">Usuário</label>
                    <input type="email" class="form-control" id="registerEmail" placeholder="Digite seu email">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">Senha</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="passwordRegister" placeholder="Digite sua senha">
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('passwordRegister', 'iconRegister')">
                            <img id="iconRegister" src="images/fechado.png" width="20" height="20">
                        </button>
                    </div>
                </div>

                <button type="button" class="btn btn-primary w-100" onclick="registerUser()">Cadastrar</button>
            </form>
        </div>
    </div>

    <script>
        function registerUser(){
            let email = document.getElementById("registerEmail").value;
            let password = document.getElementById("passwordRegister").value;

            if (email && password){
                localStorage.setItem("userEmail", email);
                localStorage.setItem("userPassword", password);
                alert("Cadastro realizado com sucesso! Faça login para continuar.");
                showForm('login');
            } else{
                alert("Preencha todos os campos!");
            }
        }

        function loginUser(){
            let email = document.getElementById("loginEmail").value;
            let password = document.getElementById("passwordLogin").value;

            let storedEmail = localStorage.getItem("userEmail");
            let storedPassword = localStorage.getItem("userPassword");

            if (email === storedEmail && password === storedPassword){
                alert("Login bem-sucedido! Redirecionando...");
                window.location.href = "paginaInicial.html";
            } else{
                alert("Email ou senha incorretos!");
            }
        }

        function togglePassword(inputId, iconId) {
            let passwordField = document.getElementById(inputId);
            let icon = document.getElementById(iconId);
            
            let isPassword = passwordField.type === "password";
            passwordField.type = isPassword ? "text" : "password";
            
            icon.src = isPassword ? "images/aberto.png" : "images/fechado.png";
        }

        function showForm(formType) {
            document.getElementById('formLogin').style.display = formType === 'login' ? 'block' : 'none';
            document.getElementById('formRegister').style.display = formType === 'register' ? 'block' : 'none';
        }

        showForm('login');
    </script>

</body>
</html>
