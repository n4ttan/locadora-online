<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Corujão Flix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url('images/background.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            overflow: auto;
        }

        .blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 10;
            padding: 5px 0;
        }

        header img {
            width: 180px;
            margin-left: 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        nav a {
            color: #fff;
            margin: 0 15px;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.3s ease;
            text-decoration: none;
        }

        nav a:hover {
            color: #ff6347 !important;
        }

        nav a.active {
            color: #ff6347 !important;
        }

        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .contact-form {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            color: #fff;
        }

        .contact-form h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .contact-form label {
            font-size: 1.2rem;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #333;
            color: #fff;
            font-size: 1.1rem;
        }

        .contact-form textarea {
            resize: vertical;
            height: 200px;
        }

        .contact-form button {
            background-color: #f03232;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .contact-form button:hover {
            background-color: #f32525;
        }

        .success-message {
            color: #28a745;
            font-size: 1.5rem;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <header>
        <div class="d-flex align-items-center ms-3" style="height: 100%;">
            <img src="images/logotipo.png" alt="Corujão Flix" width="200">
            
            <nav class="d-flex justify-content-center align-items-center" style="font-family: 'Roboto', sans-serif; font-weight: 500;">
                <a href="paginaInicial.html" class="text-white mx-3">Página Inicial</a>
                <a href="filmes.html" class="text-white mx-3">Filmes</a> 
                <a href="trailers.html" class="text-white mx-3">Trailers</a> 
                <a href="trilhaSonora.html" class="text-white mx-3">Trilha Sonora</a> 
                <a href="contato.html" class="text-white mx-3">Contato</a> 
                <a href="sobre.html" class="text-white mx-3">Sobre</a> 
                <a href="sair.html" class="btn btn-danger mx-3">Sair</a>
            </nav>                
        </div>
    </header>

    <br>

    <div class="blur-overlay"></div>

    <div class="content">
        <div class="contact-form">
            <h2>Entre em Contato</h2>
            <form id="contactForm">
                <div class="mb-3">
                    <label for="name" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Número de Telefone</label>
                    <input type="tel" class="form-control" id="phone" name="phone" required>
                </div>
                <div class="mb-3">
                    <label for="subject" class="form-label">Assunto</label>
                    <input type="text" class="form-control" id="subject" name="subject" required>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Mensagem</label>
                    <textarea class="form-control" id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Enviar</button>
            </form>

            <div id="successMessage" class="success-message">Enviado com sucesso!</div>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            document.getElementById('successMessage').style.display = 'block';

            document.getElementById('contactForm').reset();

            setTimeout(function() {
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
