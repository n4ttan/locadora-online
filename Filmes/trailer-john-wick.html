<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corujão Flix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url('John Wick 4/wallpapper.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            overflow: auto;
        }

        .blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
        }

        .img-fluid {
            max-height: 500px;
            object-fit: cover;
        }

        .text-column {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        video {
            width: 100%;
            height: auto;
            max-width: 100%;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>

</head>

<body>
    <header class="bg-dark text-white py-1" style="min-height: 50px;">
        <div class="d-flex align-items-center ms-3" style="height: 100%;">
            <img src="images/logotipo.png" alt="Corujão Flix" width="200">
            
            <nav class="d-flex justify-content-center align-items-center" style="font-family: 'Roboto', sans-serif; font-weight: 500;">
                <a href="../paginaInicial.html" class="text-white mx-3">Página Inicial</a>
                <a href="../filmes.html" class="text-white mx-3">Filmes</a> 
                <a href="../trailers.html" class="text-white mx-3">Trailers</a> 
                <a href="../trilhaSonora.html" class="text-white mx-3">Trilha Sonora</a> 
                <a href="../contato.html" class="text-white mx-3">Contato</a> 
                <a href="../sobre.html" class="text-white mx-3">Sobre</a> 
                <a href="../sair.html" class="btn btn-danger mx-3">Sair</a>
            </nav>                
        </div>
    </header>
    <br>
    <div class="blur-overlay"></div>

    <div class="container mt-5">
        <div class="row align-items-center justify-content-center">

            <div class="col-md-12 text-center mt-4 text-white">
                <a class="btn btn-danger btn-lg mt-3">
                    Assista ao Trailer abaixo 📽️
                </a>
                <video controls>
                    <source src="John Wick 4/trailer.mp4" type="video/mp4">
                    Seu navegador não suporta o formato de vídeo.
                </video>
            </div>

            <div class="col-md-6 text-center">
                <a href="../filmes.html" class="btn btn-danger mt-5">Voltar</a>
            </div>
        </div>
    </div>
    <br>

</body>
</html>
