<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilha Sonora - Annabelle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: url('O Grande Gatsby/wallpapper.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            overflow: auto;
        }
        
        .blur-overlay{ 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: -1;
        }
        
        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>

<body>
    <header class="bg-dark text-white py-1" style="min-height: 50px;">
        <div class="d-flex align-items-center ms-3" style="height: 100%;">
            <img src="images/logotipo.png" alt="Corujão Flix" width="200">
            
            <nav class="d-flex justify-content-center align-items-center" style="font-family: 'Roboto', sans-serif; font-weight: 500;">
                <a href="../paginaInicial.html" class="text-white mx-3">Página Inicial</a>
                <a href="../filmes.html" class="text-white mx-3">Filmes</a> 
                <a href="../trailers.html" class="text-white mx-3">Trailers</a> 
                <a href="../trilhaSonora.html" class="text-white mx-3">Trilha Sonora</a> 
                <a href="../contato.html" class="text-white mx-3">Contato</a> 
                <a href="../sobre.html" class="text-white mx-3">Sobre</a> 
                <a href="../sair.html" class="btn btn-danger mx-3">Sair</a>
            </nav>                
        </div>
    </header>

    <div class="blur-overlay"></div>

    <div class="content">
        <h1>Trilha Sonora - O Grande Gatsby</h1>
        <p>Ouça abaixo as músicas do filme O Grande Gatsby.</p>
        
        <div class="mt-4">
            <h3>Young and Beautiful</h3>
            <audio controls>
                <source src="O Grande Gatsby/track.mp3" type="audio/mpeg">
                Seu navegador não suporta áudio.
            </audio>
        </div>
        
        <div class="mt-4">
            <h3>Love Is the Drug</h3>
            <audio controls>
                <source src="O Grande Gatsby/track1.mp3" type="audio/mpeg">
                Seu navegador não suporta áudio.
            </audio>
        </div>
    </div>
</body>
</html>
