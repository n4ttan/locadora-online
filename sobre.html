<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre o Desenvolvedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url('images/background.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            overflow: auto;
        }

        .blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 10;
            padding: 5px 0;
        }

        header img {
            width: 180px;
            margin-left: 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        nav a {
            color: #fff;
            margin: 0 15px;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.3s ease;
            text-decoration: none;
        }

        nav a:hover {
            color: #ff6347 !important;
        }

        nav a.active {
            color: #ff6347 !important;
        }

        .profile-card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            color: #fff;
        }

        .profile-card img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #fff;
            margin-bottom: 20px;
        }

        .profile-card h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .profile-card p {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <header>
        <div class="d-flex align-items-center ms-3" style="height: 100%;">
            <img src="images/logotipo.png" alt="Corujão Flix" width="200">
            
            <nav class="d-flex justify-content-center align-items-center" style="font-family: 'Roboto', sans-serif; font-weight: 500;">
                <a href="paginaInicial.html" class="text-white mx-3">Página Inicial</a>
                <a href="filmes.html" class="text-white mx-3">Filmes</a> 
                <a href="trailers.html" class="text-white mx-3">Trailers</a> 
                <a href="trilhaSonora.html" class="text-white mx-3">Trilha Sonora</a> 
                <a href="contato.html" class="text-white mx-3">Contato</a> 
                <a href="sobre.html" class="text-white mx-3">Sobre</a> 
                <a href="sair.html" class="btn btn-danger mx-3">Sair</a>
            </nav>                
        </div>
    </header>

    <br>

    <div class="blur-overlay"></div>

    <div class="content">
        <div class="profile-card">
            <img src="images/foto.jpg" alt="Nattan Silva Montel">
            <h2>Nattan Silva Montel</h2>
            <p><strong>Idade:</strong> 20 anos</p>
            <p><strong>Cidade:</strong> Poços de Caldas, MG</p>
            <p><strong>Endereço:</strong> Rua Dr. David Benetito Ottoni</p>
            <p><strong>Período:</strong> 4º Período</p>
            <p><strong>Curso:</strong> Bacharelado em Engenharia da Computação</p>
        </div>
    </div>
</body>
</html>
